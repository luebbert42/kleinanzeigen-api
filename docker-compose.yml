services:
  kleinanzeigen-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kleinanzeigen-api
    restart: unless-stopped
    environment:
      BASIC_AUTH_USERNAME: ${BASIC_AUTH_USERNAME:-}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:-}
    ports:
      - "${KLEINANZEIGEN_API_PORT:-8000}:8000"
    networks:
      - n8n
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

networks:
  n8n:
    external: true
    name: ${N8N_DOCKER_NETWORK:-n8n}
